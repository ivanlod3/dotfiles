add_newline = true

format = "$time$username$hostname$directory$git_branch$git_status$container$character"

[time]
disabled = false
time_format = "%H:%M:%S"
format = "[$time]($style) "
style = "bold #33c7ff"

[username]
show_always = true
format = "[$user](#8a8f98)"

[hostname]
ssh_only = false
format = "[@$hostname](#8a8f98) "

[directory]
format = "[$path]($style) "
style = "bold #00b3ad"
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = ""
format = "[±|$branch]($style)"
style = "bold #39ff14"

[git_status]
format = "[$ahead_behind]($ahead_behind_style)[$modified$deleted$renamed$staged$untracked$conflicted$stashed]($style)"
style = "bold #ff5f5f"
ahead_behind_style = "bold #39ff14"
modified = " x|"
deleted = " x|"
renamed = " x|"
staged = " x|"
untracked = " x|"
conflicted = " x|"
stashed = " x|"
up_to_date = ""
ahead = " +${count}"
behind = " -${count}"
diverged = " +${ahead_count} -${behind_count}"

[container]
format = "[box:$name]($style) "
style = "bold #ffd75f"

[character]
success_symbol = "[➜](bold #39ff14) "
error_symbol = "[➜](bold #ff5f5f) "
vicmd_symbol = "[➜](bold #ffd75f) "
